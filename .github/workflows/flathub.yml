name: Update Flathub
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write  # Required to upload assets to releases
  actions: write

jobs:
  build-and-upload:
    name: Build and upload .flatpak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install source generators
        run: |
          pip install flatpak-node-generator tomlkit aiohttp
          git clone --depth 1 https://github.com/flatpak/flatpak-builder-tools flatpak/flatpak-builder-tools

      - name: Run update-manifest.sh
        run: bash flatpak/update-manifest.sh "${{ inputs.version }}"

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install required runtimes
        run: |
          # ⚠️ Update to match your manifest's runtime-version
          flatpak install -y flathub org.freedesktop.Platform//22.08 org.freedesktop.Sdk//22.08

      - name: Build .flatpak bundle
        run: |
          # ⚠️ Update path to your manifest file
          MANIFEST="flatpak/app.yaak.Yaak.yml"
          APP_ID="app.yaak.Yaak"  # ⚠️ Must match 'id' in your manifest
          
          flatpak-builder --repo=repo --force-clean build-dir "$MANIFEST"
          flatpak build-bundle repo yaak-${{ inputs.version }}.flatpak "$APP_ID"

      - name: Upload .flatpak to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: yaak-${{ inputs.version }}.flatpak
          tag_name: ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
